services:
  nginx:
    image: nginx:alpine
    container_name: escola_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend:z
      - ./frontend:/var/www/frontend:z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      - app
      - frontend
    networks:
      - escola_network

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: escola_app
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend:z
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:z
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    command: sh -lc "chown -R www-data:www-data /var/www/backend/storage /var/www/backend/bootstrap/cache && php-fpm"
    networks:
      - escola_network

  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: escola_worker
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend:z
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:z
    depends_on:
      - mysql
      - redis
      - app
    command: sh -lc "chown -R www-data:www-data /var/www/backend/storage /var/www/backend/bootstrap/cache && php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600"
    restart: unless-stopped
    networks:
      - escola_network

  frontend:
    image: node:20-alpine
    container_name: escola_frontend
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend:z
      - frontend_node_modules:/var/www/frontend/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - escola_network

  mysql:
    image: mysql:8.0
    container_name: escola_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: escola_db
      MYSQL_USER: escola_user
      MYSQL_PASSWORD: escola_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:z
    networks:
      - escola_network

  redis:
    image: redis:7-alpine
    container_name: escola_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - escola_network

networks:
  escola_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  frontend_node_modules:
